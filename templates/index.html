<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TERMINAL // OCR Parser</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&display=swap');
        :root {
            /* Colors */
            --color-midnight-oil: #000000;
            --color-ghost-white: #ffffff;
            --color-steel-gray: #1d1d1d;
            --color-muted-ash: #383838;
            --color-dim-gray: #888888;
            /* Typography */
            --font-soehne-mono: 'Space Mono', ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, monospace;
            --text-body: 16px;
            --leading-body: 1.2;
            --tracking-body: 0.24px;
            /* Spacing */
            --spacing-8: 8px;
            --spacing-16: 16px;
            --spacing-26: 26.5px;
            --spacing-48: 48px;
            /* Layout */
            --page-max-width: 1600px;
            --radius-10: 10px;
        }
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }
        body, html {
            width: 100%;
            height: 100%;
            font-family: var(--font-soehne-mono);
            font-size: var(--text-body);
            line-height: var(--leading-body);
            letter-spacing: var(--tracking-body);
            background-color: var(--color-midnight-oil);
            color: var(--color-ghost-white);
            -webkit-font-smoothing: antialiased;
        }
        header {
            width: 100%;
            padding: var(--spacing-26);
            display: flex;
            align-items: center;
            justify-content: space-between;
            border-bottom: 1px solid var(--color-muted-ash);
            background-color: var(--color-midnight-oil);
        }
        .header-left {
            display: flex;
            align-items: center;
            gap: var(--spacing-16);
        }
        .logo {
            height: 32px;
            width: auto;
            border-radius: var(--radius-10); /* Soften if it's an image block */
        }
        .logo-fallback {
            font-weight: bold;
            color: var(--color-ghost-white);
        }
        .system-status {
            color: var(--color-dim-gray);
            font-size: 14px;
        }
        main {
            max-width: var(--page-max-width);
            margin: 0 auto;
            padding: var(--spacing-48) var(--spacing-26);
            display: flex;
            gap: var(--spacing-16);
            flex-direction: column;
            align-items: center;
        }
        .panel {
            width: 100%;
            max-width: 700px;
            background-color: var(--color-steel-gray);
            border: 1px solid var(--color-muted-ash);
            border-radius: var(--radius-10);
            padding: var(--spacing-26);
            display: flex;
            flex-direction: column;
            gap: var(--spacing-16);
        }
        .panel.transparent {
            background-color: transparent;
        }
        h1 {
            font-size: var(--text-body);
            font-weight: normal;
            color: var(--color-ghost-white);
            text-transform: uppercase;
            margin-bottom: var(--spacing-8);
        }
        p {
            color: var(--color-dim-gray);
            margin-bottom: var(--spacing-16);
        }
        input[type="file"] {
            display: none;
        }
        .btn-ghost {
            display: inline-block;
            background: transparent;
            color: var(--color-ghost-white);
            border: 1px solid var(--color-muted-ash);
            border-radius: var(--radius-10);
            padding: 19.2px 25.6px;
            font-family: inherit;
            font-size: inherit;
            cursor: pointer;
            text-decoration: none;
            text-align: center;
            width: fit-content;
            transition: background 0.2s, color 0.2s;
        }
        .btn-ghost:hover {
            background: var(--color-steel-gray);
        }
        .btn-high-contrast {
            display: inline-block;
            background: var(--color-ghost-white);
            color: var(--color-midnight-oil);
            border: none;
            border-radius: var(--radius-10);
            padding: 19.2px 25.6px;
            font-family: inherit;
            font-size: inherit;
            font-weight: bold;
            cursor: pointer;
            text-decoration: none;
            text-align: center;
            width: auto;
            transition: opacity 0.2s;
        }
        .btn-high-contrast:hover {
            opacity: 0.8;
        }
        .btn-high-contrast:disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }
        .terminal-block {
            background-color: var(--color-midnight-oil);
            border: 1px solid var(--color-muted-ash);
            border-radius: var(--radius-10);
            padding: var(--spacing-16);
            font-size: 14px;
            min-height: 120px;
            overflow-y: auto;
            display: flex;
            flex-direction: column;
            gap: 8px;
        }

        .input-field {
            background-color: var(--color-midnight-oil);
            color: var(--color-ghost-white);
            border: 1px solid var(--color-muted-ash);
            border-radius: var(--radius-10);
            padding: 6.4px 19.2px;
            font-family: inherit;
            font-size: inherit;
            width: 100px;
            outline: none;
        }

        .input-field:focus {
            border-color: var(--color-dim-gray);
        }

        .term-line {
            color: var(--color-dim-gray);
        }
        .term-line.highlight { color: var(--color-ghost-white); }
        .term-line.error { color: #ff6b6b; }
        .progress-wrapper {
            display: flex;
            align-items: center;
            gap: var(--spacing-16);
            margin-top: var(--spacing-8);
            width: 100%;
        }
        .progress-label {
            color: var(--color-ghost-white);
            min-width: 50px;
        }
        .progress-bar-bg {
            flex-grow: 1;
            height: 12px;
            background-color: var(--color-midnight-oil);
            border: 1px solid var(--color-muted-ash);
            border-radius: var(--radius-10);
            overflow: hidden;
            position: relative;
        }
        .progress-bar-fill {
            height: 100%;
            width: 0%;
            background-color: var(--color-ghost-white);
            transition: width 0.4s ease;
        }
        .hidden {
            display: none !important;
        }
        .row {
            display: flex;
            align-items: center;
            gap: var(--spacing-16);
        }
    </style>
</head>
<body>
    <header>
        <div class="header-left">
            <img src="/img/logo.png" alt="Logo" class="logo" onerror="this.style.display='none'; document.getElementById('logo-fallback').style.display='block';">
            <span id="logo-fallback" class="logo-fallback" style="display:none;">[OCR_SYS]</span>
            <span class="system-status">SYS.ONLINE // WORKBENCH</span>
        </div>
        <div class="header-right">
            <span class="system-status">V 1.0</span>
        </div>
    </header>
    <main>
        <div class="panel">
            <h1>Video Processing Node</h1>
            <p>Upload video to parse price tags and render CSV markup.</p>

            <div class="row" id="uploadActions">
                <label class="btn-ghost">
                    [Select File]
                    <input type="file" id="videoInput" accept=".mp4,.avi,.mov,.mkv">
                </label>
                <div id="selectedFileName" class="system-status">[No file selected]</div>
            </div>

            <div class="row" id="configActions" style="margin-top: 8px;">
                <label for="frameStride" style="color: var(--color-dim-gray);">--frame-stride</label>
                <input type="number" id="frameStride" value="50" min="1" max="1000" class="input-field">
            </div>

            <button class="btn-high-contrast hidden" id="uploadBtn" style="margin-top: 16px;">INITIATE PARSING</button>
        </div>

        <div class="panel hidden" id="progressPanel">
            <h1>Task Status</h1>
            <div class="terminal-block" id="terminalOutput">
                <div class="term-line">> Waiting for system allocation...</div>
            </div>
            <div class="progress-wrapper">
                <div class="progress-bar-bg">
                    <div class="progress-bar-fill" id="progressBar"></div>
                </div>
                <div class="progress-label" id="statusText">0%</div>
            </div>
        </div>
        <div class="panel transparent hidden" id="resultContainer">
            <a href="#" class="btn-high-contrast" id="downloadBtn" download>DOWNLOAD CSV</a>
        </div>
    </main>
    <script>
        const videoInput = document.getElementById('videoInput');
        const uploadBtn = document.getElementById('uploadBtn');
        const selectedFileName = document.getElementById('selectedFileName');
        const frameStrideInput = document.getElementById('frameStride');

        const uploadActions = document.getElementById('uploadActions');
        const configActions = document.getElementById('configActions');
        const progressPanel = document.getElementById('progressPanel');
        const progressBar = document.getElementById('progressBar');
        const statusText = document.getElementById('statusText');
        const resultContainer = document.getElementById('resultContainer');
        const downloadBtn = document.getElementById('downloadBtn');
        const term = document.getElementById('terminalOutput');
        function logMsg(msg, status = '') {
            const el = document.createElement('div');
            el.className = 'term-line ' + status;
            el.innerText = '> ' + msg;
            term.appendChild(el);
            term.scrollTop = term.scrollHeight;
        }
        videoInput.addEventListener('change', () => {
            if (videoInput.files.length > 0) {
                selectedFileName.innerText = '[' + videoInput.files[0].name + ']';
                selectedFileName.style.color = 'var(--color-ghost-white)';
                uploadBtn.classList.remove('hidden');
            }
        });
        uploadBtn.addEventListener('click', async () => {
            const file = videoInput.files[0];
            const stride = frameStrideInput.value || 50;
            if (!file) return;

            const formData = new FormData();
            formData.append('file', file);
            formData.append('frame_stride', stride);

            uploadBtn.classList.add('hidden');
            uploadActions.classList.add('hidden');
            configActions.classList.add('hidden');
            progressPanel.classList.remove('hidden');

            logMsg(`Uploading file to server... (--frame-stride ${stride})`, 'highlight');

            try {
                const response = await fetch('/upload', {
                    method: 'POST',
                    body: formData
                });
                const data = await response.json();
                if (data.task_id) {
                    logMsg('Upload complete. Task ID: ' + data.task_id);
                    logMsg('Running frame extraction and OCR pipeline...');
                    pollStatus(data.task_id);
                }
            } catch (err) {
                logMsg('UPLOAD FAILED', 'error');
            }
        });
        async function pollStatus(taskId) {
            const interval = setInterval(async () => {
                try {
                    const res = await fetch(`/status/${taskId}?_=${Date.now()}`);
                    const data = await res.json();
                    if (data.status === 'processing' || data.status === 'pending') {
                        const pct = data.progress.toFixed(1);
                        progressBar.style.width = pct + '%';
                        statusText.innerText = pct + '%';
                    } else if (data.status === 'done') {
                        clearInterval(interval);
                        progressBar.style.width = '100%';
                        statusText.innerText = '100%';
                        logMsg('Pipeline finished successfully.', 'highlight');
                        logMsg('Generating CSV output...');
                        setTimeout(() => {
                            resultContainer.classList.remove('hidden');
                            downloadBtn.href = `/download/${taskId}`;
                        }, 500);
                    } else if (data.status === 'error') {
                        clearInterval(interval);
                        statusText.innerText = 'ERR';
                        logMsg('SYSTEM ERROR: ' + data.error, 'error');
                    }
                } catch (e) {
                    // ignore network blips
                }
            }, 1000);
        }
    </script>
</body>
</html>
